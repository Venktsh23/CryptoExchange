<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Crypto Exchange — Live Feed</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f13;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      padding: 20px;
    }

    h1 {
      color: #00ff88;
      font-size: 1.4rem;
      margin-bottom: 4px;
    }

    .subtitle {
      color: #666;
      font-size: 0.8rem;
      margin-bottom: 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .panel {
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 8px;
      padding: 16px;
    }

    .panel h2 {
      font-size: 0.75rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 12px;
    }

    /* Connection status */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
      padding: 8px 12px;
      background: #1a1a24;
      border-radius: 6px;
      font-size: 0.8rem;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ff4444;
      transition: background 0.3s;
    }

    .dot.connected { background: #00ff88; }

    /* Price display */
    .price-display {
      font-size: 2.2rem;
      font-weight: bold;
      color: #00ff88;
      margin-bottom: 4px;
      transition: color 0.3s;
    }

    .price-display.up   { color: #00ff88; }
    .price-display.down { color: #ff4444; }

    .price-meta {
      font-size: 0.75rem;
      color: #555;
    }

    /* Order placement */
    .form-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    input, select {
      background: #0f0f13;
      border: 1px solid #2a2a3a;
      color: #e0e0e0;
      padding: 8px 10px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.85rem;
      flex: 1;
      min-width: 80px;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #00ff88;
    }

    button {
      padding: 8px 20px;
      border: none;
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.85rem;
      cursor: pointer;
      font-weight: bold;
      transition: opacity 0.2s;
    }

    button:hover { opacity: 0.85; }

    .btn-buy  { background: #00ff88; color: #0f0f13; }
    .btn-sell { background: #ff4444; color: white; }
    .btn-sub  { background: #3a3aff; color: white; }

    /* Trade feed */
    #trade-feed {
      height: 280px;
      overflow-y: auto;
      font-size: 0.78rem;
    }

    .trade-row {
      display: flex;
      justify-content: space-between;
      padding: 5px 0;
      border-bottom: 1px solid #1e1e2a;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(-6px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .trade-price { color: #00ff88; }
    .trade-qty   { color: #888; }
    .trade-time  { color: #444; }

    /* Order response log */
    #log {
      height: 120px;
      overflow-y: auto;
      font-size: 0.75rem;
      color: #666;
    }

    .log-line { padding: 2px 0; border-bottom: 1px solid #1a1a24; }
    .log-line.ok  { color: #00aa55; }
    .log-line.err { color: #ff4444; }

    /* Subscribe bar */
    .sub-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .sub-bar input { flex: 1; }
  </style>
</head>
<body>

<h1>⚡ Crypto Exchange</h1>
<p class="subtitle">Live matching engine feed — Phase 2</p>

<div class="status-bar">
  <div class="dot" id="dot"></div>
  <span id="status-text">Disconnected</span>
</div>

<div class="grid">

  <!-- LEFT: Live price + trade feed -->
  <div class="panel">
    <h2>Live Market Feed</h2>

    <div class="sub-bar">
      <input id="sub-pair" value="BTC/USD" placeholder="BTC/USD" />
      <button class="btn-sub" onclick="subscribe()">Subscribe</button>
    </div>

    <div class="price-display" id="live-price">—</div>
    <div class="price-meta" id="price-meta">Waiting for first trade...</div>

    <br/>
    <h2>Recent Trades</h2>
    <div id="trade-feed"></div>
  </div>

  <!-- RIGHT: Place orders -->
  <div class="panel">
    <h2>Place Order</h2>

    <div class="form-row">
      <input id="userId"      value="user-1"   placeholder="User ID" />
      <input id="tradingPair" value="BTC/USD"  placeholder="Pair" />
    </div>

    <div class="form-row">
      <input id="price"    type="number" value="60000" placeholder="Price" />
      <input id="quantity" type="number" value="1.5"   placeholder="Quantity" step="0.01" />
    </div>

    <div class="form-row">
      <button class="btn-buy"  onclick="placeOrder(0)">BUY</button>
      <button class="btn-sell" onclick="placeOrder(1)">SELL</button>
    </div>

    <br/>
    <h2>Order Log</h2>
    <div id="log"></div>
  </div>

</div>

<!-- SignalR client library — loaded from CDN, no npm needed -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>

<script>
  const API = 'http://localhost:5000';
  let connection = null;
  let lastPrice  = null;
  let currentPair = 'BTC/USD';

  // ─── Connect to SignalR hub ───────────────────────────
  async function connect() {
    connection = new signalR.HubConnectionBuilder()
      .withUrl(`${API}/hubs/marketdata`)
      .withAutomaticReconnect()
      .build();

    // Listen for trade events from the server
    connection.on('TradeExecuted', (trade) => {
      addTradeRow(trade);
    });

    // Listen for price updates
    connection.on('PriceUpdated', (data) => {
      updatePrice(data.price);
      document.getElementById('price-meta')
        .textContent = `${data.tradingPair} · Last update: ${new Date(data.timestamp).toLocaleTimeString()}`;
    });

    // Subscription confirmed
    connection.on('Subscribed', (data) => {
      addLog(`✓ ${data.message}`, 'ok');
    });

    connection.onreconnecting(() => setStatus(false));
    connection.onreconnected(() => {
      setStatus(true);
      subscribe(); // Rejoin group after reconnect
    });

    try {
      await connection.start();
      setStatus(true);
      subscribe(); // Auto-subscribe to default pair
    } catch (err) {
      addLog(`Connection failed: ${err}`, 'err');
    }
  }

  // ─── Subscribe to a trading pair group ───────────────
  async function subscribe() {
    const pair = document.getElementById('sub-pair').value.trim().toUpperCase();
    if (!pair || !connection) return;

    currentPair = pair;
    document.getElementById('live-price').textContent = '—';
    document.getElementById('price-meta').textContent = `Waiting for trades on ${pair}...`;
    document.getElementById('trade-feed').innerHTML = '';

    await connection.invoke('SubscribeToPair', pair);
  }

  // ─── Place an order via HTTP POST ────────────────────
  async function placeOrder(side) {
    const body = {
      userId:      document.getElementById('userId').value,
      tradingPair: document.getElementById('tradingPair').value.toUpperCase(),
      side:        side,
      price:       parseFloat(document.getElementById('price').value),
      quantity:    parseFloat(document.getElementById('quantity').value)
    };

    try {
      const res  = await fetch(`${API}/api/orders`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(body)
      });

      const data = await res.json();

      if (res.ok) {
        addLog(`✓ ${side === 0 ? 'BUY' : 'SELL'} order placed — ID: ${data.orderId.substring(0,8)}...`, 'ok');
      } else {
        addLog(`✗ Error: ${JSON.stringify(data)}`, 'err');
      }
    } catch (err) {
      addLog(`✗ Request failed: ${err}`, 'err');
    }
  }

  // ─── UI helpers ───────────────────────────────────────
  function updatePrice(newPrice) {
    const el = document.getElementById('live-price');
    el.textContent = `$${Number(newPrice).toLocaleString('en-US', {minimumFractionDigits: 2})}`;

    if (lastPrice !== null) {
      el.className = 'price-display ' + (newPrice >= lastPrice ? 'up' : 'down');
    }
    lastPrice = newPrice;
  }

  function addTradeRow(trade) {
    const feed = document.getElementById('trade-feed');
    const time = new Date(trade.executedAt).toLocaleTimeString();
    const row  = document.createElement('div');
    row.className = 'trade-row';
    row.innerHTML = `
      <span class="trade-price">$${Number(trade.price).toLocaleString()}</span>
      <span class="trade-qty">${Number(trade.quantity).toFixed(4)} BTC</span>
      <span class="trade-qty">$${Number(trade.totalValue).toLocaleString()}</span>
      <span class="trade-time">${time}</span>
    `;

    // Newest trades at the top
    feed.insertBefore(row, feed.firstChild);

    // Keep only last 50 trades in the DOM
    while (feed.children.length > 50)
      feed.removeChild(feed.lastChild);
  }

  function addLog(msg, type = '') {
    const log  = document.getElementById('log');
    const line = document.createElement('div');
    line.className = `log-line ${type}`;
    line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    log.insertBefore(line, log.firstChild);
  }

  function setStatus(connected) {
    document.getElementById('dot').className       = 'dot ' + (connected ? 'connected' : '');
    document.getElementById('status-text').textContent = connected ? 'Connected to matching engine' : 'Reconnecting...';
  }

  // Start connection when page loads
  connect();
</script>
</body>
</html>
